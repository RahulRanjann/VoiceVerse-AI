name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-quality:
    name: Node quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate database client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Run TypeScript quality gates
        run: pnpm turbo run lint typecheck test build --filter='!@voiceverse/ai-service'

      - name: Install Playwright Chromium
        run: pnpm --filter @voiceverse/web exec playwright install --with-deps chromium

      - name: Run browser acceptance tests
        run: pnpm --filter @voiceverse/web test:e2e

      - name: Upload browser failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/voiceverse-playwright-artifacts
          if-no-files-found: ignore
          retention-days: 14

  python-quality:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.12'
          working-directory: services/ai

      - name: Synchronize locked environment
        run: uv sync --project services/ai --locked --all-groups

      - name: Lint
        run: uv run --project services/ai --frozen ruff check services/ai

      - name: Type check
        run: uv run --project services/ai --frozen mypy services/ai/src services/ai/tests

      - name: Test with coverage
        run: uv run --project services/ai --frozen pytest services/ai --cov=voiceverse_ai --cov-report=term-missing

      - name: Compile
        run: uv run --project services/ai --frozen python -m compileall -q services/ai/src

  database-migrations:
    name: Fresh and M4 upgrade migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: voiceverse
          POSTGRES_PASSWORD: voiceverse_ci_only
          POSTGRES_USER: voiceverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voiceverse -d voiceverse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DIRECT_URL: postgresql://voiceverse:voiceverse_ci_only@127.0.0.1:5432/voiceverse
      UPGRADE_DIRECT_URL: postgresql://voiceverse:voiceverse_ci_only@127.0.0.1:5432/voiceverse_m5_upgrade
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply complete migration chain
        run: pnpm db:migrate:deploy

      - name: Verify fresh migration status and schema drift
        run: |
          pnpm --filter @voiceverse/database migrate:status
          pnpm --filter @voiceverse/database migrate:diff

      - name: Create isolated M4 upgrade rehearsal database
        run: >-
          psql "postgresql://voiceverse:voiceverse_ci_only@127.0.0.1:5432/postgres"
          --set ON_ERROR_STOP=1
          --command 'CREATE DATABASE voiceverse_m5_upgrade'

      - name: Rehearse M4 to M5 upgrade with representative data
        env:
          DIRECT_URL: ${{ env.UPGRADE_DIRECT_URL }}
        run: pnpm --filter @voiceverse/database migrate:rehearse:m5

  infrastructure-quality:
    name: Infrastructure configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example -f infrastructure/docker/compose.yaml config --quiet

  container-images:
    name: Container image builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build malware scanner image
        run: docker compose --env-file .env.example --file infrastructure/docker/compose.yaml build clamav

      - name: Build API and worker image
        run: docker compose --env-file .env.example --file infrastructure/docker/compose.yaml --profile application build api

      - name: Build web image
        run: docker compose --env-file .env.example --file infrastructure/docker/compose.yaml --profile application build web

      - name: Build AI contract image
        run: docker compose --env-file .env.example --file infrastructure/docker/compose.yaml --profile application build ai
