name: Deploy database migrations

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Protected GitHub environment containing SUPABASE_MIGRATION_URL
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: database-migration-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    env:
      DIRECT_URL: ${{ secrets.SUPABASE_MIGRATION_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Require migration connection
        run: test -n "$DIRECT_URL"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate database client
        run: pnpm db:generate

      - name: Deploy forward migrations
        run: pnpm db:migrate:deploy
