name: voiceverse

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    networks: [voiceverse]

  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [voiceverse]

  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z}
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - '127.0.0.1:${MINIO_API_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://127.0.0.1:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - minio_data:/data
    networks: [voiceverse]

  minio-init:
    image: ${MINIO_CLIENT_IMAGE:-quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z}
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: ['/bin/sh', '-c']
    command:
      - >-
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"; do sleep 1; done;
        mc mb --ignore-existing "local/$${S3_BUCKET}";
        mc anonymous set none "local/$${S3_BUCKET}"
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    restart: 'no'
    networks: [voiceverse]

  web:
    profiles: [application]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      APP_VERSION: ${APP_VERSION:-development}
    ports:
      - '127.0.0.1:${WEB_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    restart: unless-stopped
    tmpfs: [/tmp]
    networks: [voiceverse]

  api:
    profiles: [application]
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-true}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_VERSION: ${APP_VERSION:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: voiceverse-api
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-voiceverse}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-none}
      REDIS_URL: redis://redis:6379/0
      WEB_ORIGIN: http://localhost:${WEB_PORT:-3000}
    ports:
      - '127.0.0.1:${API_PORT:-3001}:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health/live').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    restart: unless-stopped
    tmpfs: [/tmp]
    networks: [voiceverse]

  ai:
    profiles: [application]
    build:
      context: ../..
      dockerfile: services/ai/Dockerfile
    environment:
      AI_HOST: 0.0.0.0
      AI_PORT: 8000
      APP_VERSION: ${APP_VERSION:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: ${NODE_ENV:-development}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAMESPACE: ${OTEL_SERVICE_NAMESPACE:-voiceverse}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-none}
    ports:
      - '127.0.0.1:${AI_PORT:-8000}:8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    read_only: true
    restart: unless-stopped
    tmpfs: [/tmp]
    networks: [voiceverse]

  otel-collector:
    profiles: [observability]
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ../observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
    depends_on: [tempo, loki]
    restart: unless-stopped
    networks: [voiceverse]

  prometheus:
    profiles: [observability]
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command: ['--config.file=/etc/prometheus/prometheus.yaml', '--storage.tsdb.retention.time=7d']
    volumes:
      - ../observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - '127.0.0.1:9090:9090'
    restart: unless-stopped
    networks: [voiceverse]

  tempo:
    profiles: [observability]
    image: ${TEMPO_IMAGE:-grafana/tempo:latest}
    command: ['-config.file=/etc/tempo.yaml']
    volumes:
      - ../observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped
    networks: [voiceverse]

  loki:
    profiles: [observability]
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    command: ['-config.file=/etc/loki/local-config.yaml']
    volumes:
      - ../observability/loki.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks: [voiceverse]

  grafana:
    profiles: [observability]
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-voiceverse_local_only}
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '127.0.0.1:3002:3000'
    depends_on: [prometheus, tempo, loki]
    restart: unless-stopped
    networks: [voiceverse]

networks:
  voiceverse:
    name: voiceverse

volumes:
  grafana_data:
  loki_data:
  minio_data:
  postgres_data:
  prometheus_data:
  redis_data:
  tempo_data:
